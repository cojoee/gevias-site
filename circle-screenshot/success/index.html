<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Screenshot — You're all set</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'><rect width='32' height='32' rx='8' fill='%23D97757'/><circle cx='16' cy='16' r='9.5' stroke='%23fff' stroke-width='2.5' fill='none'/><polyline points='13.1,16.1 15.5,18.7 19.2,13.4' stroke='%23fff' stroke-width='1.9' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F0EDE6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #1A1A18;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .card {
      background: #FAF9F5;
      border: 1px solid #E4E1D8;
      border-radius: 20px;
      padding: 40px 36px 36px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 8px 32px rgba(26, 26, 24, 0.07),
        0 2px 8px rgba(26, 26, 24, 0.03);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-text {
      font-family: 'Lora', Georgia, 'Times New Roman', serif;
      font-weight: 600;
      font-size: 17px;
      color: #1A1A18;
      letter-spacing: -0.01em;
    }

    .headline {
      font-family: 'Lora', Georgia, 'Times New Roman', serif;
      font-weight: 600;
      font-size: 24px;
      color: #1A1A18;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 14px;
    }

    .body {
      font-size: 14px;
      font-weight: 400;
      color: #6B6962;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .next-step {
      font-size: 13px;
      font-weight: 500;
      color: #1A1A18;
      background: rgba(217, 119, 87, 0.06);
      border: 1px solid rgba(217, 119, 87, 0.12);
      border-radius: 10px;
      padding: 14px 18px;
      line-height: 1.55;
    }

    .accent { color: #D97757; }

    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 0.01ms !important; }
    }

    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; }
      .headline { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
        <rect width="32" height="32" rx="8" fill="#D97757"/>
        <circle cx="16" cy="16" r="9.5" stroke="#fff" stroke-width="2.5" fill="none"/>
        <polyline points="13.1,16.1 15.5,18.7 19.2,13.4" stroke="#fff" stroke-width="1.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">Circle Screenshot</span>
    </div>

    <h1 class="headline">Welcome to Circle Screenshot Pro 🎉</h1>

    <p class="body">
      No more daily limits, no more counting. Just capture and crop — your images, always private.
    </p>

    <p class="next-step">
      You're all set — go capture something ✨
    </p>
  </div>
</body>
</html>
